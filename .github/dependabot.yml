# Weekly dependency-update PRs (audit dim-6: no update automation or
# vulnerability scanning). Grouped to keep PR volume low; security updates
# always arrive individually regardless of the schedule.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ['minor', 'patch']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
